<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0a0a0a" />
<title>Logbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  html, body {
    background: #0a0a0a;
    color: #f0ece0;
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body {
    /* phone-shaped viewport on desktop */
    display: flex; justify-content: center; align-items: stretch;
    background:
      radial-gradient(circle at 50% 0%, rgba(212,164,55,0.05), transparent 70%),
      #050505;
  }
  #root {
    width: 100%; max-width: 440px;
    background: #0a0a0a;
    box-shadow: 0 0 80px rgba(0,0,0,0.6);
    position: relative;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  * { box-sizing: border-box; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  button { font: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes sheet-up { from { transform: translateY(20%); opacity: 0.7; } to { transform: translateY(0); opacity: 1; } }
  @keyframes sheet-fade { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="store.js"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens-home.jsx"></script>
<script type="text/babel" src="screens-schedule.jsx"></script>
<script type="text/babel" src="screens-train.jsx"></script>
<script type="text/babel" src="screens-lib.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
