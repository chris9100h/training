     the connection while the HTML head is still parsing instead of waiting
     for the parser to reach each <script>/<link> tag below. -->

<style>
  :root {
    --bg: #07060a;
    --bg-raised: #100d0b;
    --bg-inset: #1a1611;
    --bg-body: #050409;
    --bg-rgb: 7,6,10;
    --ink: #ece4d0;
    --ink-soft: rgba(236,228,208,0.66);
    --ink-faint: rgba(236,228,208,0.34);
    --ink-ghost: rgba(236,228,208,0.14);
    --hair: rgba(236,228,208,0.10);
    --hair-strong: rgba(236,228,208,0.18);
    /* RGB triple used by decorative textures (knurl, guilloche). Flipped to a
       dark value in light mode so the hash marks stay visible on a pale bg. */
    --knurl-rgb: 236,228,208;
    /* Surface tints — cream-on-dark defaults; overridden in light mode */
    --surface-tint:      rgba(236,228,208,0.02);
    --surface-tint-sm:   rgba(236,228,208,0.03);
    --surface-tint-md:   rgba(236,228,208,0.04);
    --surface-tint-lg:   rgba(236,228,208,0.06);
    --root-glow:         rgba(236,228,208,0.06);
    --overlay-tint:      rgba(255,255,255,0.03);
    --success-tint-xs:   rgba(123,196,123,0.05);
    --success-border:    rgba(123,196,123,0.25);
    --neutral-tint:      rgba(160,160,160,0.07);
    --neutral-border-sm: rgba(160,160,160,0.3);
    --success-text:      #7bc47b;
    --accent: #c9a961;
    --accent-light: #e5c97e;
    --accent-deep: #8b6f3d;
    --accent-rgb: 201,169,97;
    --accent-faint: rgba(var(--accent-rgb),0.10);
    --accent-soft: rgba(var(--accent-rgb),0.30);
    --danger: #c87469;
    --danger-rgb: 200,116,105;
    --ok: #8fb069;
  }
  html, body { min-height: 100vh; margin: 0; }
  html, body {
    background: var(--bg-body);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    /* phone-shaped viewport on desktop */
    display: flex; justify-content: center; align-items: stretch;
    background: var(--bg-body);
  }
  #root {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    margin: 0 auto;
    width: 100%; max-width: 440px;
    background: var(--bg);
    box-shadow: 0 0 0 1px var(--root-glow);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  @media (min-width: 768px) {
    #root {
      max-width: 100%;
      box-shadow: none;
    }
  }
  /* Installed PWA: #root (position:fixed) draws --bg; the body behind it is the
     slightly darker --bg-body. On iOS, WebKit can momentarily inset/shift #root
     below the status bar after a visualViewport change (keyboard), revealing the
     body as a band behind the clock. Match the body to --bg there so the reveal
     is invisible. (Browser/desktop keep the darker "phone frame" surround.) */
  @media (display-mode: standalone) {
    html, body { background: var(--bg); }
  }
  * { box-sizing: border-box; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
    box-shadow: 0 0 0 1000px transparent inset !important;
    -webkit-text-fill-color: var(--ink) !important;
    transition: background-color 5000s ease-in-out 0s;
  }
  button { font: inherit; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  a { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* industrial crosshatch texture */
  .guilloche {
    background-image:
      repeating-linear-gradient(
        45deg,
        rgba(var(--knurl-rgb),0.018) 0px, rgba(var(--knurl-rgb),0.018) 1px,
        transparent 1px, transparent 10px
      ),
      repeating-linear-gradient(
        -45deg,
        rgba(var(--knurl-rgb),0.018) 0px, rgba(var(--knurl-rgb),0.018) 1px,
        transparent 1px, transparent 10px
      );
  }
  .guilloche-h {
    background-image: repeating-linear-gradient(
      0deg,
      transparent 0, transparent 5px,
      rgba(var(--knurl-rgb),0.025) 5px, rgba(var(--knurl-rgb),0.025) 6px
    );
  }

  /* utility classes used by JSX */
  .num { font-family: "JetBrains Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
  .display { font-family: "Big Shoulders Display", "Arial Narrow", sans-serif; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; }
  .display-it { font-family: "Big Shoulders Display", "Arial Narrow", sans-serif; font-weight: 900; letter-spacing: 0.02em; text-transform: uppercase; }
  .micro { font-family: "Inter", system-ui, sans-serif; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); font-weight: 500; }
  .micro-gold { font-family: "Inter", system-ui, sans-serif; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .label { font-family: "Inter", system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); font-weight: 500; }

  @keyframes sheet-up { from { transform: translateY(30%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes sheet-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes timerPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  @keyframes logoPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(var(--accent-rgb),0.5); } 60% { box-shadow: 0 0 0 18px rgba(var(--accent-rgb),0); } }
  @keyframes improvedBorderPulse {
    0%, 100% { box-shadow: inset 0 0 40px 12px rgba(var(--accent-rgb),0.25); }
    50%       { box-shadow: inset 0 0 70px 22px rgba(var(--accent-rgb),0.55); }
  }
  @keyframes improvedFade {
    0%   { opacity: 0; }
    8%   { opacity: 1; }
    72%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes regressionBorderPulse {
    0%, 100% { box-shadow: inset 0 0 40px 12px rgba(var(--danger-rgb),0.25); }
    50%       { box-shadow: inset 0 0 70px 22px rgba(var(--danger-rgb),0.55); }
  }
  @keyframes pulseGold { 0%, 100% { box-shadow: 0 20px 60px rgba(var(--accent-rgb),0.30), 0 0 0 0.5px rgba(var(--accent-rgb),0.6), inset 0 1px 0 rgba(255,240,200,0.4), inset 0 -8px 24px rgba(0,0,0,0.25); } 70% { box-shadow: 0 20px 60px rgba(var(--accent-rgb),0.30), 0 0 0 14px rgba(var(--accent-rgb),0), inset 0 1px 0 rgba(255,240,200,0.4), inset 0 -8px 24px rgba(0,0,0,0.25); } }
  @keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes rowFlash { 0% { box-shadow: inset 0 0 0 9999px rgba(143,176,105,0.20); } 100% { box-shadow: inset 0 0 0 9999px rgba(143,176,105,0); } }
  @keyframes perfectWeekPulse { 0%, 100% { text-shadow: 0 0 0px rgba(var(--accent-rgb),0); } 50% { text-shadow: 0 0 14px rgba(var(--accent-rgb),0.9); } }
  @keyframes tourRingPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(var(--accent-rgb),0.5); } 60% { box-shadow: 0 0 0 8px rgba(var(--accent-rgb),0); } }
  .perfect-week-pulse { animation: perfectWeekPulse 2.4s ease-in-out infinite; }
  @keyframes intensityGlow {
    0%, 100% { box-shadow: 0 0 6px rgba(var(--accent-rgb),0.4), 0 0 20px rgba(var(--accent-rgb),0.12); }
    50%       { box-shadow: 0 0 14px rgba(var(--accent-rgb),0.72), 0 0 36px rgba(var(--accent-rgb),0.26); }
  }
  .intensity-glow { animation: intensityGlow 2.5s ease-in-out infinite; }

  /* Drag-to-reorder (plan days · day exercises). Imperatively driven by
     UI.useDragReorder — the ghost is a clone of the picked-up row that
     tracks the finger, the drop-line marks where it will land. */
  body.reorder-dragging, body.reorder-dragging * { cursor: grabbing !important; }
  .reorder-source { opacity: 0.32 !important; transition: opacity .12s ease; }
  .reorder-ghost {
    position: fixed; z-index: 9999; margin: 0; pointer-events: none;
    box-sizing: border-box; will-change: transform, opacity;
    box-shadow: 0 18px 44px -12px rgba(0,0,0,0.7), 0 0 0 1px rgba(var(--accent-rgb),0.45);
    transition: opacity .14s ease;
  }
  .reorder-ghost * { pointer-events: none !important; }
  .reorder-drop-line {
    position: fixed; z-index: 9998; height: 2px; pointer-events: none;
    background: var(--accent); border-radius: 999px;
    box-shadow: 0 0 8px rgba(var(--accent-rgb),0.6);
  }
  .reorder-drop-line-h {
    position: fixed; z-index: 9998; width: 2px; pointer-events: none;
    background: var(--accent); border-radius: 999px;
    box-shadow: 0 0 8px rgba(var(--accent-rgb),0.6);
  }

  /* Dumbbell knurling — diagonal hash marks like grip texture */
  .knurl {
    height: 3px;
    flex-shrink: 0;
    background: repeating-linear-gradient(
      -60deg,
      rgba(var(--knurl-rgb),0.20) 0px, rgba(var(--knurl-rgb),0.20) 1.5px,
      transparent 1.5px, transparent 6px
    );
  }
</style>

<body>
<div id="root"></div>
<div id="err" style="display:none;position:fixed;inset:0;background:#07060a;color:#c87469;font-family:monospace;font-size:13px;padding:24px;overflow:auto;z-index:9999">
  <div id="err-log" style="white-space:pre-wrap"></div>
</div>
<script>

// Known-benign global noise — never actionable here, and blocking the whole
// screen for it does real harm: browser extensions (crypto wallets like
// Brave's own built-in wallet, translators, etc.) inject their own scripts
// into every page and can throw on their own internal state, which
// window.onerror/onunhandledrejection can't tell apart from a real app bug.
var BENIGN_NOISE = /ResizeObserver loop|translateDisabled|ethereum/i;

// Shared by every path that shows this overlay (below, plus the "React did
// not mount" and BOOT-failure fallbacks further down) — a stale/broken
// precompile cache is a common real cause, and "Dismiss" alone wouldn't fix
// that, only hide the symptom.
function makeClearCacheButton() {
  var btn = document.createElement('button');
  btn.textContent = 'Clear cache & reload';
  btn.style.cssText = 'margin-top:16px;margin-right:8px;display:inline-block;padding:10px 20px;background:#c87469;color:#07060a;border:none;border-radius:6px;font-family:monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.04em';
  btn.onclick = async function() {
    btn.textContent = 'Clearing…';
    if ('caches' in window) { var keys = await caches.keys(); await Promise.all(keys.map(function(k){ return caches.delete(k); })); }
    window.location.reload(true);
  };
  return btn;
}

// Shows the overlay with a "Clear cache & reload" button always available
// (in case a stale/broken cache is the actual cause) and — only once the
// app has actually mounted, so there's something usable to dismiss to — a
// lighter Dismiss button too.
function showErrOverlay() {
  var d = document.getElementById('err');
  if (d.style.display !== 'block') {
    d.style.display = 'block';
    d.appendChild(makeClearCacheButton());
    if (document.getElementById('root').children.length) {
      var dismiss = document.createElement('button');
      dismiss.textContent = 'Dismiss';
      dismiss.style.cssText = 'margin-top:16px;display:inline-block;padding:10px 20px;background:transparent;color:#c87469;border:1px solid #c87469;border-radius:6px;font-family:monospace;font-size:13px;cursor:pointer;letter-spacing:0.04em';
      dismiss.onclick = function() { d.style.display = 'none'; };
      d.appendChild(dismiss);
    }
  }
  return document.getElementById('err-log');
}

window.onerror = function(msg, src, line, col, err) {
  if (typeof msg === 'string' && BENIGN_NOISE.test(msg)) return;
  // Cross-origin/extension-injected scripts report as a bare "Script error."
  // with no location at all — the browser deliberately strips all detail for
  // these, so it's never actionable and is most often a browser extension
  // throwing on its own injected script, not a bug in this app.
  if (msg === 'Script error.' && !src && !line) return;
  showErrOverlay().textContent += '[JS ERROR] ' + msg + '\n  ' + src + ':' + line + '\n\n';
};
window.onunhandledrejection = function(e) {
  var reason = e.reason?.message || e.reason;
  if (typeof reason === 'string' && BENIGN_NOISE.test(reason)) return;
  showErrOverlay().textContent += '[PROMISE] ' + reason + '\n\n';
};
// Fallback: if React never mounts after 6s, show diagnostic info.
// If a new SW is waiting, auto-send SKIP_WAITING and reload — this breaks
// the deadlock where a broken SW serves bad files and React never mounts,
// which means the update banner never shows and the new SW never activates.
setTimeout(async function() {
  if (document.getElementById('root').children.length) return;
  // If a new SW is waiting, skip it immediately and reload — breaks the deadlock
  // where a broken SW serves bad files so React never mounts and the update
  // banner never appears.
  try {
    var reg = navigator.serviceWorker && await navigator.serviceWorker.getRegistration();
    if (reg && reg.waiting) {
      reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      setTimeout(function() { window.location.reload(); }, 400);
      return;
    }
  } catch(e) {}
  var d = document.getElementById('err');
  var log = document.getElementById('err-log');
  d.style.display = 'block';
  log.textContent += '[TIMEOUT] React did not mount.\n';
  log.textContent += 'window.LB: ' + typeof window.LB + '\n';
  log.textContent += 'window.supabase: ' + typeof window.supabase + '\n';
  log.textContent += 'window.Screens: ' + JSON.stringify(Object.keys(window.Screens||{})) + '\n';
  log.textContent += 'window.React: ' + typeof window.React + '\n';
  log.textContent += 'window.Screen: ' + typeof window.Screen + '\n';
  d.appendChild(makeClearCacheButton());
}, 6000);
</script>

window.ACCENT_PALETTE = {

var _DARK_HAIR         = 'rgba(236,228,208,0.10)';

var _DARK_TINTS = {

    hair: 'rgba(31,27,22,0.20)', hairStrong: 'rgba(31,27,22,0.42)', knurlRgb: '31,27,22',
    surfaceTint:     'rgba(31,27,22,0.05)',
    surfaceTintSm:   'rgba(31,27,22,0.07)',
    surfaceTintMd:   'rgba(31,27,22,0.09)',
    surfaceTintLg:   'rgba(31,27,22,0.11)',
    rootGlow:        'rgba(31,27,22,0.18)',
    overlayTint:     'rgba(31,27,22,0.05)',
    successTintXs:   'rgba(70,130,70,0.12)',

  s.setProperty('--surface-tint-md',   m.surfaceTintMd   || t.surfaceTintMd);
  s.setProperty('--surface-tint-lg',   m.surfaceTintLg   || t.surfaceTintLg);
  s.setProperty('--root-glow',         m.rootGlow        || t.rootGlow);
  s.setProperty('--overlay-tint',      m.overlayTint     || t.overlayTint);
  s.setProperty('--success-tint-xs',   m.successTintXs   || t.successTintXs);
  s.setProperty('--success-border',    m.successBorder   || t.successBorder);
  s.setProperty('--neutral-tint',      m.neutralTint     || t.neutralTint);
  s.setProperty('--neutral-border-sm', m.neutralBorderSm || t.neutralBorderSm);
  s.setProperty('--success-text',      m.successText     || t.successText);
  var tc = document.querySelector('meta[name="theme-color"]');
  if (tc) tc.content = m.bg;
};
window.applyDarkMode(localStorage.getItem('logbook-dark-mode') || 'dark');

<script>
// iOS standalone PWA viewport guard.
// Focusing a native input (e.g. the email/password fields on login, or an input
// inside a bottom sheet) shrinks the visualViewport. WebKit can then leave our
// position:fixed #root inset/shifted below the safe area — black bands top and
// bottom that persist after the keyboard closes (most visible after a
// logout→login). When nothing is focused (keyboard closed) re-pin the page to
// the top so #root snaps back to full-screen. Guarded so it never fights the
// keyboard scrolling a focused field into view.
(function () {
  var vv = window.visualViewport;
  if (!vv) return;
  var repin = function () {
    var ae = document.activeElement;
    if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.isContentEditable)) return;
    if (window.pageYOffset || window.pageXOffset || vv.offsetTop) window.scrollTo(0, 0);
  };
  vv.addEventListener('resize', repin);
  vv.addEventListener('scroll', repin);
  window.addEventListener('focusout', function () { setTimeout(repin, 50); });
})();
</script>

     development builds, with no dev-mode runtime overhead. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<!-- Plain JS (no JSX) — run directly, no transpile needed. -->
<script src="src/supabase.js"></script>
<script src="src/store.js"></script>
<script src="src/whatsnew.js"></script>

<!-- ────────────────────────────────────────────────────────────────────────
     Precompile loader — boots the app without re-running Babel every start.

     The screens are authored in JSX. Previously every cold start downloaded
     Babel Standalone (~3 MB) and re-transpiled ~1.7 MB of JSX on the main
     thread — several blocking seconds on a phone. Instead we transpile each
     file once, cache the resulting JS in IndexedDB keyed by a content hash,
     and on later starts execute the cached JS directly. Babel is fetched
     lazily and only when a file is new or changed (cache miss). On any
     failure we fall back to transpiling everything through Babel, so boot can
     never end up worse than before.

     The `env` preset targets `{ esmodules: true }` (modern evergreen
     browsers) instead of the unset default (which downlevels all the way to
     ES5). Measured on the actual app sources, that's a ~5x drop in transpile
     time — by far the biggest cost on a cache-miss boot — and is safe here
     because the app already requires IndexedDB + Service Worker + fetch, so
     nothing older ever runs it anyway.

     html2canvas (only needed for the share-screenshot button) is likewise
     loaded on demand instead of blocking boot.
──────────────────────────────────────────────────────────────────────── -->
<script>
(function () {
  // Executed in this exact order: ui.jsx defines shared primitives the screens
  // reference, app.jsx mounts React last. Order must be preserved.
  var SOURCES = [
    'src/ui.jsx',
    'src/screens-home.jsx',
    'src/screens-schedule.jsx',
    'src/screens-train.jsx',
    'src/screens-lib.jsx',
    'src/screens-settings.jsx',
    'src/screens-coaching-core.jsx',
    'src/screens-coaching-client.jsx',
    'src/screens-coaching-detail.jsx',
    'src/screens-coaching-tabs.jsx',
    'src/screens-health.jsx',
    'src/screens-onboarding.jsx',
    'src/screens-cardio.jsx',
    'src/app.jsx',
  ];
  var BABEL_URL = 'https://unpkg.com/@babel/standalone@7.29.0/babel.min.js';
  // Same classic-script scope as the legacy <script type="text/babel"> setup,
  // but env targets modern evergreen browsers instead of the (much slower)
  // ES5-downleveling default — see comment above. Bump the suffix if these
  // options change so previously cached output is invalidated.
  var PRESETS = ['react', ['env', { targets: { esmodules: true } }]];
  var PRESET_TAG = 'react+env-esm.script.v2';
  var DB_NAME = 'zane-precompile';
  var STORE = 'modules';

  // cyrb53 — fast non-crypto content hash. Invalidates cached output whenever a
  // source file changes; no secure context or async crypto required.
  function hash(str) {
    var h1 = 0xdeadbeef, h2 = 0x41c6ce57;
    for (var i = 0; i < str.length; i++) {
      var ch = str.charCodeAt(i);
      h1 = Math.imul(h1 ^ ch, 2654435761);
      h2 = Math.imul(h2 ^ ch, 1597334677);
    }
    h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
    h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
    return (4294967296 * (2097151 & h2) + (h1 >>> 0)).toString(36);
  }

  function idbOpen() {
    return new Promise(function (resolve, reject) {
      var req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function () { req.result.createObjectStore(STORE); };
      req.onsuccess = function () { resolve(req.result); };
      req.onerror = function () { reject(req.error); };
    });
  }
  function idbGet(db, key) {
    return new Promise(function (resolve) {
      try {
        var r = db.transaction(STORE, 'readonly').objectStore(STORE).get(key);
        r.onsuccess = function () { resolve(r.result || null); };
        r.onerror = function () { resolve(null); };
      } catch (e) { resolve(null); }
    });
  }
  function idbPut(db, key, val) {
    try { db.transaction(STORE, 'readwrite').objectStore(STORE).put(val, key); } catch (e) {}
  }
  function idbCount(db) {
    return new Promise(function (resolve) {
      try {
        var r = db.transaction(STORE, 'readonly').objectStore(STORE).count();
        r.onsuccess = function () { resolve(r.result); };
        r.onerror = function () { resolve(-1); };
      } catch (e) { resolve(-1); }
    });
  }

  var babelPromise = null;
  function ensureBabel() {
    if (window.Babel) return Promise.resolve(window.Babel);
    if (!babelPromise) {
      babelPromise = new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.src = BABEL_URL;
        s.integrity = 'sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y';
        s.crossOrigin = 'anonymous';
        s.onload = function () { resolve(window.Babel); };
        s.onerror = function () { reject(new Error('Babel failed to load')); };
        document.head.appendChild(s);
      });
    }
    return babelPromise;
  }

  function transpile(src, filename) {
    return ensureBabel().then(function (Babel) {
      return Babel.transform(src, {
        presets: PRESETS,
        sourceType: 'script',
        filename: filename,
      }).code;
    });
  }

  // Append as a classic inline script so it runs synchronously and in order,
  // sharing the global scope exactly like the original text/babel scripts.
  function execute(code, filename) {
    var s = document.createElement('script');
    s.textContent = code + '\n//# sourceURL=' + filename;
    document.head.appendChild(s);
  }

  function showError(e) {
    var d = document.getElementById('err');
    var log = document.getElementById('err-log');
    if (d && log) { d.style.display = 'block'; log.textContent += '[BOOT] ' + (e && e.message || e) + '\n'; }
  }

  // Last resort: transpile + run everything through Babel (no caching).
  // Behaviourally identical to the app before this optimisation.
  function fallback() {
    var chain = Promise.resolve();
    SOURCES.forEach(function (src) {
      chain = chain.then(function () {
        return fetch(src).then(function (r) { return r.text(); })
          .then(function (code) { return transpile(code, src); })
          .then(function (out) { execute(out, src); });
      });
    });
    return chain.catch(showError);
  }

  function boot() {
    // Guard against rare environments where IndexedDB.open() hangs (some iOS
    // PWA states) — after the timeout we just proceed cache-less via Babel.
    var dbPromise = Promise.race([
      idbOpen().catch(function () { return null; }),
      new Promise(function (resolve) { setTimeout(function () { resolve(null); }, 3000); }),
    ]);
    var fetchAll = Promise.all(SOURCES.map(function (src) {
      return fetch(src).then(function (r) {
        if (!r.ok) throw new Error('fetch ' + src + ' → ' + r.status);
        return r.text();
      });
    }));

    // Speculative warmup: an empty (or unavailable) precompile cache means
    // this is effectively a first boot — every file below will miss and need
    // Babel anyway, so start downloading it now, in parallel with the JSX
    // fetch, instead of only after fetchAll resolves and the per-file cache
    // lookups confirm the miss (saves a full network round-trip on the
    // slowest path). No-op cost on a warm cache: ensureBabel() is never
    // called again once it's already resolved.
    dbPromise.then(function (db) {
      if (!db) { ensureBabel(); return; }
      idbCount(db).then(function (n) { if (n <= 0) ensureBabel(); });
    });

    Promise.all([dbPromise, fetchAll]).then(function (res) {
      var db = res[0], sources = res[1];
      // Resolve each file to runnable JS: from cache when the content hash
      // matches, otherwise transpile (lazy-loading Babel) and write it back.
      return Promise.all(sources.map(function (code, i) {
        var key = SOURCES[i] + '|' + PRESET_TAG;
        var h = hash(code);
        var lookup = db ? idbGet(db, key) : Promise.resolve(null);
        return lookup.then(function (rec) {
          if (rec && rec.h === h && typeof rec.code === 'string') return rec.code;
          return transpile(code, SOURCES[i]).then(function (out) {
            if (db) idbPut(db, key, { h: h, code: out });
            return out;
          });
        });
      }));
    }).then(function (compiled) {
      // Promise.all preserves order, so compiled[i] === SOURCES[i].
      compiled.forEach(function (code, i) { execute(code, SOURCES[i]); });
    }).catch(function (e) {
      showError(e);
      return fallback();
    });
  }

  // Lazily load html2canvas the first time a screenshot is actually taken.
  window.__ensureHtml2Canvas = function () {
    if (window.html2canvas) return Promise.resolve(window.html2canvas);
    if (!window.__h2cPromise) {
      window.__h2cPromise = new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.crossOrigin = 'anonymous';
        s.onload = function () { resolve(window.html2canvas); };
        s.onerror = function () { reject(new Error('html2canvas failed to load')); };
        document.head.appendChild(s);
      });
    }
    return window.__h2cPromise;
  };

  boot();
})();
</script>

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
