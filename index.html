<meta name="theme-color" content="#07060a" />

<style>
  :root {
    --bg: #07060a;
    --bg-raised: #100d0b;
    --bg-inset: #1a1611;
    --bg-body: #050409;
    --bg-rgb: 7,6,10;
    --ink: #ece4d0;
    --ink-soft: rgba(236,228,208,0.66);
    --ink-faint: rgba(236,228,208,0.34);
    --ink-ghost: rgba(236,228,208,0.14);
    --hair: rgba(236,228,208,0.10);
    --hair-strong: rgba(236,228,208,0.18);
    --accent: #c9a961;
    --accent-light: #e5c97e;
    --accent-deep: #8b6f3d;
    --accent-rgb: 201,169,97;
    --accent-faint: rgba(var(--accent-rgb),0.10);
    --accent-soft: rgba(var(--accent-rgb),0.30);
    --danger: #c87469;
    --ok: #8fb069;
  }
  html, body { min-height: 100vh; margin: 0; }
  html, body {
    background: var(--bg-body);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body {
    /* phone-shaped viewport on desktop */
    display: flex; justify-content: center; align-items: stretch;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(var(--accent-rgb),0.05), transparent 70%),
      radial-gradient(ellipse 40% 30% at 50% 100%, rgba(var(--accent-rgb),0.03), transparent 70%),
      var(--bg-body);
  }
  #root {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    margin: 0 auto;
    width: 100%; max-width: 440px;
    background: var(--bg);
    box-shadow: 0 0 120px rgba(0,0,0,0.7), 0 0 0 0.5px rgba(236,228,208,0.05);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  * { box-sizing: border-box; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
    box-shadow: 0 0 0 1000px transparent inset !important;
    -webkit-text-fill-color: var(--ink) !important;
    transition: background-color 5000s ease-in-out 0s;
  }
  button { font: inherit; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  a { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* watch-dial tapisserie pattern */
  .guilloche {
    background-image:
      radial-gradient(circle at center, rgba(236,228,208,0.03) 0.5px, transparent 1px);
    background-size: 6px 6px;
  }
  .guilloche-h {
    background-image: repeating-linear-gradient(
      0deg,
      transparent 0, transparent 3px,
      rgba(236,228,208,0.025) 3px, rgba(236,228,208,0.025) 4px
    );
  }

  /* utility classes used by JSX */
  .num { font-family: "JetBrains Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
  .display { font-family: "Cormorant Garamond", Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }
  .display-it { font-family: "Cormorant Garamond", Georgia, serif; font-style: italic; font-weight: 300; }
  .micro { font-family: "Inter", system-ui, sans-serif; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); font-weight: 500; }
  .micro-gold { font-family: "Inter", system-ui, sans-serif; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .label { font-family: "Inter", system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); font-weight: 500; }

  @keyframes sheet-up { from { transform: translateY(30%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes sheet-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes timerPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  @keyframes logoPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(var(--accent-rgb),0.5); } 60% { box-shadow: 0 0 0 18px rgba(var(--accent-rgb),0); } }
  @keyframes improvedBorderPulse {
    0%, 100% { box-shadow: inset 0 0 40px 12px rgba(var(--accent-rgb),0.25); }
    50%       { box-shadow: inset 0 0 70px 22px rgba(var(--accent-rgb),0.55); }
  }
  @keyframes improvedFade {
    0%   { opacity: 0; }
    8%   { opacity: 1; }
    72%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes pulseGold { 0%, 100% { box-shadow: 0 20px 60px rgba(var(--accent-rgb),0.30), 0 0 0 0.5px rgba(var(--accent-rgb),0.6), inset 0 1px 0 rgba(255,240,200,0.4), inset 0 -8px 24px rgba(0,0,0,0.25); } 70% { box-shadow: 0 20px 60px rgba(var(--accent-rgb),0.30), 0 0 0 14px rgba(var(--accent-rgb),0), inset 0 1px 0 rgba(255,240,200,0.4), inset 0 -8px 24px rgba(0,0,0,0.25); } }
  @keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes rowFlash { 0% { box-shadow: inset 0 0 0 9999px rgba(143,176,105,0.20); } 100% { box-shadow: inset 0 0 0 9999px rgba(143,176,105,0); } }
</style>
</head>
<body>
<div id="root"></div>
<div id="err" style="display:none;position:fixed;inset:0;background:#07060a;color:#c87469;font-family:monospace;font-size:13px;padding:24px;white-space:pre-wrap;z-index:9999;overflow:auto"></div>
<script>

window.onerror = function(msg, src, line, col, err) {
  var d = document.getElementById('err');
  d.style.display = 'block';
  d.textContent += '[JS ERROR] ' + msg + '\n  ' + src + ':' + line + '\n\n';
};
window.onunhandledrejection = function(e) {
  var d = document.getElementById('err');
  d.style.display = 'block';
  d.textContent += '[PROMISE] ' + (e.reason?.message || e.reason) + '\n\n';
};
// Fallback: if React never mounts after 6s, show diagnostic info
setTimeout(function() {
  if (!document.getElementById('root').children.length) {
    var d = document.getElementById('err');
    d.style.display = 'block';
    d.textContent += '[TIMEOUT] React did not mount.\n';
    d.textContent += 'window.LB: ' + typeof window.LB + '\n';
    d.textContent += 'window.supabase: ' + typeof window.supabase + '\n';
    d.textContent += 'window.Screens: ' + JSON.stringify(Object.keys(window.Screens||{})) + '\n';
    d.textContent += 'window.React: ' + typeof window.React + '\n';
    d.textContent += 'window.Screen: ' + typeof window.Screen + '\n';
  }
}, 6000);
</script>

<script>
window.ACCENT_PALETTE = {
  gold:   { hex: '#c9a961', light: '#e5c97e', deep: '#8b6f3d', rgb: '201,169,97',  label: 'Gold'   },
  copper: { hex: '#c47828', light: '#d9964a', deep: '#8a5010', rgb: '196,120,40',  label: 'Kupfer' },
  pink:   { hex: '#c9699a', light: '#de8fb8', deep: '#8b3f65', rgb: '201,105,154', label: 'Pink'   },
  green:  { hex: '#7ab05a', light: '#9bcc7a', deep: '#4e7a38', rgb: '122,176,90',  label: 'Grün'   },
  blue:   { hex: '#5b9bd5', light: '#7db5e8', deep: '#2e6499', rgb: '91,155,213',  label: 'Blau'   },
  red:    { hex: '#c96060', light: '#e08080', deep: '#8b3535', rgb: '201,96,96',   label: 'Rot'    },
};
window.applyAccentColor = function(key) {
  var c = window.ACCENT_PALETTE[key] || window.ACCENT_PALETTE.gold;
  var s = document.documentElement.style;
  s.setProperty('--accent', c.hex);
  s.setProperty('--accent-light', c.light);
  s.setProperty('--accent-deep', c.deep);
  s.setProperty('--accent-rgb', c.rgb);
};
window.applyAccentColor(localStorage.getItem('logbook-accent-color') || 'gold');
</script>

<script>
window.DARK_MODES = {
  dark:  { bg: '#1a1820', bgRaised: '#211e1c', bgInset: '#2a2723', bgBody: '#141218', bgRgb: '26,24,32' },
  black: { bg: '#07060a', bgRaised: '#100d0b', bgInset: '#1a1611', bgBody: '#050409', bgRgb: '7,6,10' },
};
window.applyDarkMode = function(key) {
  var m = window.DARK_MODES[key] || window.DARK_MODES.dark;
  var s = document.documentElement.style;
  s.setProperty('--bg', m.bg);
  s.setProperty('--bg-raised', m.bgRaised);
  s.setProperty('--bg-inset', m.bgInset);
  s.setProperty('--bg-body', m.bgBody);
  s.setProperty('--bg-rgb', m.bgRgb);
  var tc = document.querySelector('meta[name="theme-color"]');
  if (tc) tc.content = m.bg;
};
window.applyDarkMode(localStorage.getItem('logbook-dark-mode') || 'dark');
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
