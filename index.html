<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, interactive-widget=resizes-content" />
<meta name="theme-color" content="#07060a" />
<title>Zane</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Zane" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!-- React/ReactDOM/Babel (unpkg) and Font Awesome/html2canvas (cdnjs) — opens
     the connection while the HTML head is still parsing instead of waiting
     for the parser to reach each <script>/<link> tag below. -->
<link rel="preconnect" href="https://unpkg.com" crossorigin />
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
<style>
  :root {
    --bg: #07060a;
    --bg-raised: #100d0b;
    --bg-inset: #1a1611;
    --bg-body: #050409;
    --bg-rgb: 7,6,10;
    --ink: #ece4d0;
    --ink-soft: rgba(236,228,208,0.66);
    --ink-faint: rgba(236,228,208,0.34);
    --ink-ghost: rgba(236,228,208,0.14);
    --hair: rgba(236,228,208,0.10);
    --hair-strong: rgba(236,228,208,0.18);
    /* Width for every hairline border (the huge majority of UI.hair/
       UI.hairStrong borders use this literal). A theme can widen it, e.g.
       paper's 0.5px hairlines were reading as barely-there. */
    --hair-width: 0.5px;
    /* RGB triple used by decorative textures (knurl, guilloche). Flipped to a
       dark value in light mode so the hash marks stay visible on a pale bg. */
    --knurl-rgb: 236,228,208;
    /* Full background-image value for the theme's canvas (Screen component).
       'none' for every theme except paper, which sets a graph-paper grid. */
    --bg-texture: none;
    /* Multiplier on every knurl/guilloche alpha stop below, so a theme (paper)
       can make the texture read darker without every consumer changing. */
    --knurl-opacity: 1;
    /* text-shadow applied on Screen's root (inherits to everything under it
       unless a surface with its own opaque/semi-opaque background — Card,
       Sheet, a solid-fill Btn — resets it back to 'none'). 'none' for every
       theme except paper, whose bare grid canvas needs plain text lifted off
       the ruled lines to stay readable; a surface that already has its own
       background doesn't need it and would just look muddy. */
    --text-lift: none;
    /* Same idea as --text-lift, but for SVG chart <text> labels: CSS
       text-shadow does not paint on SVG text at all in this browser (verified
       directly: the computed value inherits fine, nothing renders), so those
       need the SVG-native equivalent (a feDropShadow filter, see #chart-text-lift
       below) instead, driven by this opacity rather than a text-shadow string.
       0 (invisible) for every theme except paper. */
    --chart-text-lift-opacity: 0;
    /* Surface tints — cream-on-dark defaults; overridden in light mode */
    --surface-tint:      rgba(236,228,208,0.02);
    --surface-tint-sm:   rgba(236,228,208,0.03);
    --surface-tint-md:   rgba(236,228,208,0.04);
    --surface-tint-lg:   rgba(236,228,208,0.06);
    --root-glow:         rgba(236,228,208,0.06);
    --overlay-tint:      rgba(255,255,255,0.03);
    --success-tint-xs:   rgba(123,196,123,0.05);
    --success-border:    rgba(123,196,123,0.25);
    --neutral-tint:      rgba(160,160,160,0.07);
    --neutral-border-sm: rgba(160,160,160,0.3);
    --success-text:      #7bc47b;
    --accent: #c9a961;
    --accent-light: #e5c97e;
    --accent-deep: #8b6f3d;
    --accent-rgb: 201,169,97;
    /* Text/icon color for anything painted directly on a solid --accent fill
       (badges, toggles, primary buttons). Near-black reads fine on every
       accent color in the palette, all of which are mid-to-bright; only
       paper's muted grey accent is dark enough to need a light ink instead. */
    --accent-ink: #0a0805;
    /* Multiplier on --accent-faint/--accent-soft below, same idea as
       --knurl-opacity: a theme (paper) can richen these shared tint/border
       tokens without every one of their many call sites changing. */
    --accent-tint-boost: 1;
    --accent-faint: rgba(var(--accent-rgb),calc(0.10 * var(--accent-tint-boost)));
    --accent-soft: rgba(var(--accent-rgb),calc(0.30 * var(--accent-tint-boost)));
    --danger: #c87469;
    --danger-rgb: 200,116,105;
    --ok: #8fb069;
    --ok-rgb: 143,176,105;
    --warn: #d97706;
    --warn-rgb: 217,119,6;
    --info: #7b8cde;
  }
  html, body { min-height: 100vh; margin: 0; }
  html, body {
    background: var(--bg-body);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    /* phone-shaped viewport on desktop */
    display: flex; justify-content: center; align-items: stretch;
    background: var(--bg-body);
  }
  #root {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    margin: 0 auto;
    width: 100%; max-width: 440px;
    background: var(--bg);
    box-shadow: 0 0 0 1px var(--root-glow);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  @media (min-width: 768px) {
    #root {
      max-width: 100%;
      box-shadow: none;
    }
  }
  /* Installed PWA: #root (position:fixed) draws --bg; the body behind it is the
     slightly darker --bg-body. On iOS, WebKit can momentarily inset/shift #root
     below the status bar after a visualViewport change (keyboard), revealing the
     body as a band behind the clock. Match the body to --bg there so the reveal
     is invisible. (Browser/desktop keep the darker "phone frame" surround.) */
  @media (display-mode: standalone) {
    html, body { background: var(--bg); }
  }
  * { box-sizing: border-box; }
  /* Form controls don't inherit text-shadow from ancestors by default (a
     browser UA-stylesheet quirk, confirmed via computed-style inspection:
     a plain div inherits --text-lift fine, a <button> wrapping the exact
     same text computes text-shadow: none regardless of nesting depth).
     Every plain-text nav row in the app (NavRow and its many lookalikes)
     is a <button>, so paper's grid-lift silently never reached them. Force
     it back to a normal inherited property; any component with its own
     explicit textShadow (btnPrimary, Card, Sheet, ...) still wins over this
     since inline styles always beat an element-selector rule. */
  button, input, select, textarea { text-shadow: inherit; }
  /* Autoreg guide (screens-autoreg-guide.jsx), section 03 feedback options:
     two columns on a phone, three on a wide screen. A media query (not CSS
     auto-fit) so a narrow phone reliably keeps two columns instead of dropping
     to one once the panel padding eats into the available width. */
  .ag-opt-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 8px; }
  @media (min-width: 760px) { .ag-opt-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  /* iOS Safari misplaces the native caret in inputs/textareas that sit inside a
     transformed / position:fixed / overflow-scroll ancestor, and every text field
     here lives in a Sheet (all three at once), so the caret lands where the field
     stood before the sheet slid up. Promoting each field to its own compositing
     layer makes WebKit compute the caret in the field's own coordinate space. This
     is layer-only (no visual shift) and does not touch the custom numeric keypad,
     which uses divs, not native inputs. */
  input, textarea { transform: translateZ(0); }
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
    box-shadow: 0 0 0 1000px transparent inset !important;
    -webkit-text-fill-color: var(--ink) !important;
    transition: background-color 5000s ease-in-out 0s;
  }
  button { font: inherit; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  a { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* industrial crosshatch texture */
  .guilloche {
    background-image:
      repeating-linear-gradient(
        45deg,
        rgba(var(--knurl-rgb),calc(0.018 * var(--knurl-opacity))) 0px, rgba(var(--knurl-rgb),calc(0.018 * var(--knurl-opacity))) 1px,
        transparent 1px, transparent 10px
      ),
      repeating-linear-gradient(
        -45deg,
        rgba(var(--knurl-rgb),calc(0.018 * var(--knurl-opacity))) 0px, rgba(var(--knurl-rgb),calc(0.018 * var(--knurl-opacity))) 1px,
        transparent 1px, transparent 10px
      );
  }
  .guilloche-h {
    background-image: repeating-linear-gradient(
      0deg,
      transparent 0, transparent 5px,
      rgba(var(--knurl-rgb),calc(0.025 * var(--knurl-opacity))) 5px, rgba(var(--knurl-rgb),calc(0.025 * var(--knurl-opacity))) 6px
    );
  }

  /* utility classes used by JSX */
  .num { font-family: "JetBrains Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
  .display { font-family: "Big Shoulders Display", "Arial Narrow", sans-serif; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; }
  .display-it { font-family: "Big Shoulders Display", "Arial Narrow", sans-serif; font-weight: 900; letter-spacing: 0.02em; text-transform: uppercase; }
  .micro { font-family: "Inter", system-ui, sans-serif; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); font-weight: 500; }
  .micro-gold { font-family: "Inter", system-ui, sans-serif; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .label { font-family: "Inter", system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); font-weight: 500; }

  @keyframes sheet-up { from { transform: translateY(30%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes sheet-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes timerPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  @keyframes logoPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(var(--accent-rgb),0.5); } 60% { box-shadow: 0 0 0 18px rgba(var(--accent-rgb),0); } }
  @keyframes improvedBorderPulse {
    0%, 100% { box-shadow: inset 0 0 40px 12px rgba(var(--accent-rgb),0.25); }
    50%       { box-shadow: inset 0 0 70px 22px rgba(var(--accent-rgb),0.55); }
  }
  @keyframes improvedFade {
    0%   { opacity: 0; }
    8%   { opacity: 1; }
    72%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes regressionBorderPulse {
    0%, 100% { box-shadow: inset 0 0 40px 12px rgba(var(--danger-rgb),0.25); }
    50%       { box-shadow: inset 0 0 70px 22px rgba(var(--danger-rgb),0.55); }
  }
  @keyframes pulseGold { 0%, 100% { box-shadow: 0 20px 60px rgba(var(--accent-rgb),0.30), 0 0 0 0.5px rgba(var(--accent-rgb),0.6), inset 0 1px 0 rgba(255,240,200,0.4), inset 0 -8px 24px rgba(0,0,0,0.25); } 70% { box-shadow: 0 20px 60px rgba(var(--accent-rgb),0.30), 0 0 0 14px rgba(var(--accent-rgb),0), inset 0 1px 0 rgba(255,240,200,0.4), inset 0 -8px 24px rgba(0,0,0,0.25); } }
  @keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes rowFlash { 0% { box-shadow: inset 0 0 0 9999px rgba(143,176,105,0.20); } 100% { box-shadow: inset 0 0 0 9999px rgba(143,176,105,0); } }
  @keyframes perfectWeekPulse { 0%, 100% { text-shadow: 0 0 0px rgba(var(--accent-rgb),0); } 50% { text-shadow: 0 0 14px rgba(var(--accent-rgb),0.9); } }
  @keyframes tourRingPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(var(--accent-rgb),0.5); } 60% { box-shadow: 0 0 0 8px rgba(var(--accent-rgb),0); } }
  /* Bigger/brighter ring than tourRingPulse, needs to read clearly on a tiny
     26px checkbox, so the subtler tour version isn't enough here. */
  @keyframes unlockRingPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(var(--accent-rgb),0.9); } 50% { box-shadow: 0 0 0 12px rgba(var(--accent-rgb),0); } }
  .perfect-week-pulse { animation: perfectWeekPulse 2.4s ease-in-out infinite; }
  @keyframes intensityGlow {
    0%, 100% { box-shadow: 0 0 6px rgba(var(--accent-rgb),0.4), 0 0 20px rgba(var(--accent-rgb),0.12); }
    50%       { box-shadow: 0 0 14px rgba(var(--accent-rgb),0.72), 0 0 36px rgba(var(--accent-rgb),0.26); }
  }
  .intensity-glow { animation: intensityGlow 2.5s ease-in-out infinite; }

  /* Beyond-failure meso summary: the whole Options box smoulders when the end
     RIR dips below 0 (hot orange inner, red outer, same palette as the ember
     watermark) so a "hell cycle" reads at a glance. */
  @keyframes hellGlow {
    0%, 100% { box-shadow: 0 0 8px rgba(255,120,40,0.40), 0 0 24px rgba(210,45,0,0.22); }
    50%      { box-shadow: 0 0 18px rgba(255,120,40,0.78), 0 0 42px rgba(210,45,0,0.42); }
  }

  /* Same hell palette as hellGlow, but rendered as a soft radial smoulder that
     fades to transparent before the edges — so it reads as fire glowing from
     within a row rather than a printed-on box with an outline. Used behind the
     5/3/1 AMRAP top set once its ramp sets are logged. */
  @keyframes hellPulse {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1; }
  }

  /* Beyond-failure meso: the RIR watermark literally catches fire as the
     target dips below 0. Everything is driven by inline custom props set per
     intensity (−1 → −3): --ember-op (base opacity), --ember-blur (glow
     radius), and a two-layer warm palette --ember-glow1 (hot inner) /
     --ember-glow2 (red outer). Irregular keyframe steps read as an organic
     flame flicker rather than a symmetric "breath", and the base cycle is
     slow (~2.4s, overridden per intensity) so it smoulders instead of
     strobing. */
  @keyframes meso-ember {
    0%   { opacity: calc(var(--ember-op,0.24) * 0.78);
           text-shadow: 0 0 calc(var(--ember-blur,24px)*0.7) var(--ember-glow1, rgba(255,150,50,0.9)),
                        0 0 calc(var(--ember-blur,24px)*1.7) var(--ember-glow2, rgba(210,45,0,0.5)); }
    22%  { opacity: var(--ember-op,0.24);
           text-shadow: 0 0 var(--ember-blur,24px) var(--ember-glow1, rgba(255,150,50,0.9)),
                        0 0 calc(var(--ember-blur,24px)*2.5) var(--ember-glow2, rgba(210,45,0,0.5)); }
    41%  { opacity: calc(var(--ember-op,0.24) * 0.7);
           text-shadow: 0 0 calc(var(--ember-blur,24px)*0.85) var(--ember-glow1, rgba(255,150,50,0.9)),
                        0 0 calc(var(--ember-blur,24px)*1.9) var(--ember-glow2, rgba(210,45,0,0.5)); }
    60%  { opacity: calc(var(--ember-op,0.24) * 1.15);
           text-shadow: 0 0 calc(var(--ember-blur,24px)*1.4) var(--ember-glow1, rgba(255,180,70,0.95)),
                        0 0 calc(var(--ember-blur,24px)*3.1) var(--ember-glow2, rgba(255,55,0,0.6)); }
    79%  { opacity: calc(var(--ember-op,0.24) * 0.82);
           text-shadow: 0 0 calc(var(--ember-blur,24px)*0.95) var(--ember-glow1, rgba(255,150,50,0.9)),
                        0 0 calc(var(--ember-blur,24px)*2) var(--ember-glow2, rgba(210,45,0,0.5)); }
    100% { opacity: calc(var(--ember-op,0.24) * 0.78);
           text-shadow: 0 0 calc(var(--ember-blur,24px)*0.7) var(--ember-glow1, rgba(255,150,50,0.9)),
                        0 0 calc(var(--ember-blur,24px)*1.7) var(--ember-glow2, rgba(210,45,0,0.5)); }
  }
  .meso-ember { animation: meso-ember 2.4s ease-in-out infinite; will-change: opacity, text-shadow; }
  @media (prefers-reduced-motion: reduce) { .meso-ember { animation: none; opacity: var(--ember-op, 0.24); } }

  /* Drag-to-reorder (plan days · day exercises). Imperatively driven by
     UI.useDragReorder — the ghost is a clone of the picked-up row that
     tracks the finger, the drop-line marks where it will land. */
  body.reorder-dragging, body.reorder-dragging * { cursor: grabbing !important; }
  .reorder-source { opacity: 0.32 !important; transition: opacity .12s ease; }
  .reorder-ghost {
    position: fixed; z-index: 9999; margin: 0; pointer-events: none;
    box-sizing: border-box; will-change: transform, opacity;
    box-shadow: 0 18px 44px -12px rgba(0,0,0,0.7), 0 0 0 1px rgba(var(--accent-rgb),0.45);
    transition: opacity .14s ease;
  }
  .reorder-ghost * { pointer-events: none !important; }
  .reorder-drop-line {
    position: fixed; z-index: 9998; height: 2px; pointer-events: none;
    background: var(--accent); border-radius: 999px;
    box-shadow: 0 0 8px rgba(var(--accent-rgb),0.6);
  }
  .reorder-drop-line-h {
    position: fixed; z-index: 9998; width: 2px; pointer-events: none;
    background: var(--accent); border-radius: 999px;
    box-shadow: 0 0 8px rgba(var(--accent-rgb),0.6);
  }

  /* Dumbbell knurling — diagonal hash marks like grip texture */
  .knurl {
    height: 3px;
    flex-shrink: 0;
    background: repeating-linear-gradient(
      -60deg,
      rgba(var(--knurl-rgb),calc(0.20 * var(--knurl-opacity))) 0px, rgba(var(--knurl-rgb),calc(0.20 * var(--knurl-opacity))) 1.5px,
      transparent 1.5px, transparent 6px
    );
  }

  /* Drives #chart-text-lift below (feDropShadow's flood-opacity IS a
     CSS-styleable property, unlike stdDeviation, so opacity is the one knob
     themed per --chart-text-lift-opacity; the blur radius stays a fixed,
     always-small value since it's invisible anyway whenever opacity is 0). */
  #chart-text-lift feDropShadow { flood-opacity: var(--chart-text-lift-opacity); }
</style>
</head>
<body>
<div id="root"></div>
<!-- Global, zero-size SVG defs: any <text filter="url(#chart-text-lift)">
     anywhere in the app can reference this one filter (SVG filter refs work
     document-wide, not just within their own <svg>). Paper-only grid-lift
     for chart labels, see --chart-text-lift-opacity: 'plain text on the
     paper grid needs lifting' also applies to axis/value labels drawn as SVG
     text, which (verified directly) silently ignores CSS text-shadow. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="chart-text-lift" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.4" flood-color="#f9fafb" />
    </filter>
  </defs>
</svg>
<div id="err" style="display:none;position:fixed;inset:0;background:#07060a;color:#c87469;font-family:monospace;font-size:13px;padding:24px;overflow:auto;z-index:9999">
  <div id="err-log" style="white-space:pre-wrap"></div>
</div>
<script>

// Known-benign global noise — never actionable here, and blocking the whole
// screen for it does real harm: browser extensions (crypto wallets like
// Brave's own built-in wallet, translators, etc.) inject their own scripts
// into every page and can throw on their own internal state, which
// window.onerror/onunhandledrejection can't tell apart from a real app bug.
var BENIGN_NOISE = /ResizeObserver loop|translateDisabled|ethereum/i;

// One-shot: the moment React actually mounts for the first time, hide the
// error overlay if it happens to be up. #root is guaranteed empty right now
// (this runs before any boot code), so the only way this fires is a genuine
// 0-children → n-children transition, and it self-destructs on that first
// fire: a LATER runtime error's overlay (root already has children by then)
// is untouched and stays up for the user to read/dismiss as intended. This
// covers every trigger path (onerror/onunhandledrejection/BOOT-catch/
// timeout) with one mechanism instead of each site managing its own poll.
// Without it, an error that fires mid-boot but self-recovers (e.g. boot()
// fails over to fallback() and fallback() succeeds) left the overlay stuck
// open forever over a working app.
var earlyMountPoll = setInterval(function() {
  if (document.getElementById('root').children.length) {
    clearInterval(earlyMountPoll);
    var d = document.getElementById('err');
    if (d) d.style.display = 'none';
  }
}, 500);

// Shared by every path that shows this overlay (below, plus the "React did
// not mount" and BOOT-failure fallbacks further down) — a stale/broken
// precompile cache is a common real cause, and "Dismiss" alone wouldn't fix
// that, only hide the symptom.
function makeClearCacheButton() {
  var btn = document.createElement('button');
  btn.textContent = 'Clear cache & reload';
  btn.style.cssText = 'margin-top:16px;margin-right:8px;display:inline-block;padding:10px 20px;background:#c87469;color:#07060a;border:none;border-radius:6px;font-family:monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.04em';
  btn.onclick = async function() {
    btn.textContent = 'Clearing…';
    if ('caches' in window) { var keys = await caches.keys(); await Promise.all(keys.map(function(k){ return caches.delete(k); })); }
    // Also nuke the IndexedDB precompile cache — a poisoned record there bricks
    // boot just as badly as a bad Cache Storage entry, and clearing only caches
    // would leave the app permanently broken with no recovery path.
    if ('indexedDB' in window) {
      await new Promise(function(resolve){
        var req = indexedDB.deleteDatabase('zane-precompile');
        req.onsuccess = req.onerror = req.onblocked = function(){ resolve(); };
      });
    }
    // Flags this as a deliberate cache wipe so the next boot's "React did not
    // mount" watchdog further down gives itself more time before giving up:
    // a wiped cache forces the guaranteed-slowest boot path (every source
    // file is an uncached network fetch), see that setTimeout for why.
    try { sessionStorage.setItem('zane-cold-boot', '1'); } catch (e) {}
    // reload(true)'s "force" argument is a removed, no-op legacy API in
    // modern browsers — a plain reload here can still be served stale by
    // the browser's own HTTP cache (a layer clearing CacheStorage/IndexedDB
    // never touches), via whichever service worker is still active. A
    // unique ?_v= query string guarantees no HTTP cache entry exists for
    // this exact URL, and sw.js's fetch handler already treats any ?_v=

        s.src = BABEL_URL;
        s.integrity = 'sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y';
        s.crossOrigin = 'anonymous';
        s.onload = function () { resolve(window.Babel); };
        s.onerror = function () { reject(new Error('Babel failed to load')); };
        document.head.appendChild(s);
      });
    }
    return babelPromise;
  }

  function transpile(src, filename) {
    return ensureBabel().then(function (Babel) {
      return Babel.transform(src, {
        presets: PRESETS,
        sourceType: 'script',
        filename: filename,
      }).code;
    });
  }

  // A wiped cache (via "Clear cache & reload") forces every one of these into
  // an uncached network round-trip with no local fallback if it fails, one
  // retry absorbs a single transient blip instead of aborting the whole boot
  // and dropping to the much slower no-cache fallback() path below.
  function fetchTextOk(url) {
    return fetch(url).then(function (r) {
      if (!r.ok) throw new Error('fetch ' + url + ' → ' + r.status);
      return r.text();
    });
  }
  function fetchTextRetry(url) {
    return fetchTextOk(url).catch(function () {
      return new Promise(function (resolve) { setTimeout(resolve, 500); })
        .then(function () { return fetchTextOk(url); });
    });
  }

  // Append as a classic inline script so it runs synchronously and in order,
  // sharing the global scope exactly like the original text/babel scripts.
  function execute(code, filename) {
    var s = document.createElement('script');
    s.textContent = code + '\n//# sourceURL=' + filename;
    document.head.appendChild(s);
  }

  // Routes through showErrOverlay() (first script block above, same page,
  // already defined by the time this can run) instead of toggling #err
  // directly: a bare "no button, no auto-hide" overlay here previously left
  // the user stuck with literally no way out if fallback() then quietly
  // mounted successfully afterward: the overlay stayed up forever, covering
  // a now-working app.
  function showError(e) {
    if (typeof showErrOverlay === 'function') {
      showErrOverlay().textContent += '[BOOT] ' + (e && e.message || e) + '\n';
    }
  }

  // Last resort: transpile + run everything through Babel (no caching).
  // Behaviourally identical to the app before this optimisation.
  function fallback() {
    var chain = Promise.resolve();
    SOURCES.forEach(function (src) {
      chain = chain.then(function () {
        return fetchTextRetry(src)
          .then(function (code) { return transpile(code, src); })
          .then(function (out) { execute(out, src); });
      });
    });
    return chain.catch(showError);
  }

  function boot() {
    // Guard against rare environments where IndexedDB.open() hangs (some iOS
    // PWA states) — after the timeout we just proceed cache-less via Babel.
    // openedDb is tracked separately from dbPromise's resolved value so it's
    // still reachable in the close() call below even down the fallback() path.
    var openedDb = null;
    var dbPromise = Promise.race([
      idbOpen().catch(function () { return null; }),
      new Promise(function (resolve) { setTimeout(function () { resolve(null); }, 3000); }),
    ]).then(function (db) { openedDb = db; return db; });
    var fetchAll = Promise.all(SOURCES.map(fetchTextRetry));

    // Speculative warmup: an empty (or unavailable) precompile cache means
    // this is effectively a first boot — every file below will miss and need
    // Babel anyway, so start downloading it now, in parallel with the JSX
    // fetch, instead of only after fetchAll resolves and the per-file cache
    // lookups confirm the miss (saves a full network round-trip on the
    // slowest path). No-op cost on a warm cache: ensureBabel() is never
    // called again once it's already resolved.
    dbPromise.then(function (db) {
      if (!db) { ensureBabel(); return; }
      idbCount(db).then(function (n) { if (n <= 0) ensureBabel(); });
    });

    Promise.all([dbPromise, fetchAll]).then(function (res) {
      var db = res[0], sources = res[1];
      // Resolve each file to runnable JS: from cache when the content hash
      // matches, otherwise transpile (lazy-loading Babel) and write it back.
      return Promise.all(sources.map(function (code, i) {
        var key = SOURCES[i] + '|' + PRESET_TAG;
        var h = hash(code);
        var lookup = db ? idbGet(db, key) : Promise.resolve(null);
        return lookup.then(function (rec) {
          if (rec && rec.h === h && typeof rec.code === 'string') return rec.code;
          return transpile(code, SOURCES[i]).then(function (out) {
            if (db) idbPut(db, key, { h: h, code: out });
            return out;
          });
        });
      }));
    }).then(function (compiled) {
      // Promise.all preserves order, so compiled[i] === SOURCES[i].
      compiled.forEach(function (code, i) { execute(code, SOURCES[i]); });
    }).catch(function (e) {
      showError(e);
      return fallback();
    }).then(function () {
      // Done reading/writing the precompile cache for this page's lifetime:
      // close the connection explicitly. Left open (as it was before), it
      // stays alive until the tab itself unloads, and a same-page "Clear
      // cache & reload" later on calls indexedDB.deleteDatabase on this exact
      // database: per spec that blocks until every open connection closes,
      // but the onblocked handler (see makeClearCacheButton above and
      // clearPrecompileCaches in store.js) treats "blocked" as "done" and
      // navigates away immediately regardless, leaving the actual delete to
      // race the next page load's own idbOpen(), sometimes past the "React
      // did not mount" watchdog. Closing here removes that race entirely.
      if (openedDb) { try { openedDb.close(); } catch (e) {} }
    });
  }

  // Lazily load html2canvas the first time a screenshot is actually taken.
  window.__ensureHtml2Canvas = function () {
    if (window.html2canvas) return Promise.resolve(window.html2canvas);
    if (!window.__h2cPromise) {
      window.__h2cPromise = new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.crossOrigin = 'anonymous';
        s.onload = function () { resolve(window.html2canvas); };
        s.onerror = function () { reject(new Error('html2canvas failed to load')); };
        document.head.appendChild(s);
      });
    }
    return window.__h2cPromise;
  };

  boot();
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
