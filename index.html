<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#07060a" />
<title>Zane</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Zane" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
<style>
  :root {
    --bg: #07060a;
    --bg-raised: #100d0b;
    --bg-inset: #1a1611;
    --bg-body: #050409;
    --bg-rgb: 7,6,10;
    --ink: #ece4d0;
    --ink-soft: rgba(236,228,208,0.66);
    --ink-faint: rgba(236,228,208,0.34);
    --ink-ghost: rgba(236,228,208,0.14);
    --hair: rgba(236,228,208,0.10);
    --hair-strong: rgba(236,228,208,0.18);
    --accent: #c9a961;
    --accent-light: #e5c97e;
    --accent-deep: #8b6f3d;
    --accent-rgb: 201,169,97;
    --accent-faint: rgba(var(--accent-rgb),0.10);
    --accent-soft: rgba(var(--accent-rgb),0.30);
    --danger: #c87469;
    --danger-rgb: 200,116,105;
    --ok: #8fb069;
  }
  html, body { min-height: 100vh; margin: 0; }
  html, body {
    background: var(--bg-body);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    /* phone-shaped viewport on desktop */
    display: flex; justify-content: center; align-items: stretch;
    background: var(--bg-body);
  }
  #root {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    margin: 0 auto;
    width: 100%; max-width: 440px;
    background: var(--bg);
    box-shadow: 0 0 0 1px rgba(236,228,208,0.06);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  @media (min-width: 768px) {
    #root {
      max-width: 100%;
      box-shadow: none;
    }
  }
  * { box-sizing: border-box; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
    box-shadow: 0 0 0 1000px transparent inset !important;
    -webkit-text-fill-color: var(--ink) !important;
    transition: background-color 5000s ease-in-out 0s;
  }
  button { font: inherit; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  a { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* industrial crosshatch texture */
  .guilloche {
    background-image:
      repeating-linear-gradient(
        45deg,
        rgba(236,228,208,0.018) 0px, rgba(236,228,208,0.018) 1px,
        transparent 1px, transparent 10px
      ),
      repeating-linear-gradient(
        -45deg,
        rgba(236,228,208,0.018) 0px, rgba(236,228,208,0.018) 1px,
        transparent 1px, transparent 10px
      );
  }
  .guilloche-h {
    background-image: repeating-linear-gradient(
      0deg,
      transparent 0, transparent 5px,
      rgba(236,228,208,0.025) 5px, rgba(236,228,208,0.025) 6px
    );
  }

  /* utility classes used by JSX */
  .num { font-family: "JetBrains Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
  .display { font-family: "Big Shoulders Display", "Arial Narrow", sans-serif; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; }
  .display-it { font-family: "Big Shoulders Display", "Arial Narrow", sans-serif; font-weight: 900; letter-spacing: 0.02em; text-transform: uppercase; }
  .micro { font-family: "Inter", system-ui, sans-serif; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); font-weight: 500; }
  .micro-gold { font-family: "Inter", system-ui, sans-serif; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .label { font-family: "Inter", system-ui, sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-faint); font-weight: 500; }

  @keyframes sheet-up { from { transform: translateY(30%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes sheet-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes timerPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  @keyframes logoPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(var(--accent-rgb),0.5); } 60% { box-shadow: 0 0 0 18px rgba(var(--accent-rgb),0); } }
  @keyframes improvedBorderPulse {
    0%, 100% { box-shadow: inset 0 0 40px 12px rgba(var(--accent-rgb),0.25); }
    50%       { box-shadow: inset 0 0 70px 22px rgba(var(--accent-rgb),0.55); }
  }
  @keyframes improvedFade {
    0%   { opacity: 0; }
    8%   { opacity: 1; }
    72%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes regressionBorderPulse {
    0%, 100% { box-shadow: inset 0 0 40px 12px rgba(var(--danger-rgb),0.25); }
    50%       { box-shadow: inset 0 0 70px 22px rgba(var(--danger-rgb),0.55); }
  }
  @keyframes pulseGold { 0%, 100% { box-shadow: 0 20px 60px rgba(var(--accent-rgb),0.30), 0 0 0 0.5px rgba(var(--accent-rgb),0.6), inset 0 1px 0 rgba(255,240,200,0.4), inset 0 -8px 24px rgba(0,0,0,0.25); } 70% { box-shadow: 0 20px 60px rgba(var(--accent-rgb),0.30), 0 0 0 14px rgba(var(--accent-rgb),0), inset 0 1px 0 rgba(255,240,200,0.4), inset 0 -8px 24px rgba(0,0,0,0.25); } }
  @keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes rowFlash { 0% { box-shadow: inset 0 0 0 9999px rgba(143,176,105,0.20); } 100% { box-shadow: inset 0 0 0 9999px rgba(143,176,105,0); } }
  @keyframes perfectWeekPulse { 0%, 100% { text-shadow: 0 0 0px rgba(var(--accent-rgb),0); } 50% { text-shadow: 0 0 14px rgba(var(--accent-rgb),0.9); } }
  .perfect-week-pulse { animation: perfectWeekPulse 2.4s ease-in-out infinite; }

  /* Drag-to-reorder (plan days · day exercises). Imperatively driven by
     UI.useDragReorder — the ghost is a clone of the picked-up row that
     tracks the finger, the drop-line marks where it will land. */
  body.reorder-dragging, body.reorder-dragging * { cursor: grabbing !important; }
  .reorder-source { opacity: 0.32 !important; transition: opacity .12s ease; }
  .reorder-ghost {
    position: fixed; z-index: 9999; margin: 0; pointer-events: none;
    box-sizing: border-box; will-change: transform, opacity;
    box-shadow: 0 18px 44px -12px rgba(0,0,0,0.7), 0 0 0 1px rgba(var(--accent-rgb),0.45);
    transition: opacity .14s ease;
  }
  .reorder-ghost * { pointer-events: none !important; }
  .reorder-drop-line {
    position: fixed; z-index: 9998; height: 2px; pointer-events: none;
    background: var(--accent); border-radius: 999px;
    box-shadow: 0 0 8px rgba(var(--accent-rgb),0.6);
  }

  /* Dumbbell knurling — diagonal hash marks like grip texture */
  .knurl {
    height: 3px;
    flex-shrink: 0;
    background: repeating-linear-gradient(
      -60deg,
      rgba(236,228,208,0.20) 0px, rgba(236,228,208,0.20) 1.5px,
      transparent 1.5px, transparent 6px
    );
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="err" style="display:none;position:fixed;inset:0;background:#07060a;color:#c87469;font-family:monospace;font-size:13px;padding:24px;white-space:pre-wrap;z-index:9999;overflow:auto"></div>
<script>

window.onerror = function(msg, src, line, col, err) {
  // Benign, well-known browser warning — not a real error; don't surface it.
  if (typeof msg === 'string' && msg.indexOf('ResizeObserver loop') !== -1) return;
  var d = document.getElementById('err');
  d.style.display = 'block';
  d.textContent += '[JS ERROR] ' + msg + '\n  ' + src + ':' + line + '\n\n';
};
window.onunhandledrejection = function(e) {
  var d = document.getElementById('err');
  d.style.display = 'block';
  d.textContent += '[PROMISE] ' + (e.reason?.message || e.reason) + '\n\n';
};
// Fallback: if React never mounts after 6s, show diagnostic info
setTimeout(function() {
  if (!document.getElementById('root').children.length) {
    var d = document.getElementById('err');
    d.style.display = 'block';
    d.textContent += '[TIMEOUT] React did not mount.\n';
    d.textContent += 'window.LB: ' + typeof window.LB + '\n';
    d.textContent += 'window.supabase: ' + typeof window.supabase + '\n';
    d.textContent += 'window.Screens: ' + JSON.stringify(Object.keys(window.Screens||{})) + '\n';
    d.textContent += 'window.React: ' + typeof window.React + '\n';
    d.textContent += 'window.Screen: ' + typeof window.Screen + '\n';
  }
}, 6000);
</script>

<script>
window.ACCENT_PALETTE = {
  gold:   { hex: '#c9a961', light: '#e5c97e', deep: '#8b6f3d', rgb: '201,169,97',  label: 'Gold'   },
  copper: { hex: '#c47828', light: '#d9964a', deep: '#8a5010', rgb: '196,120,40',  label: 'Copper' },
  pink:   { hex: '#c9699a', light: '#de8fb8', deep: '#8b3f65', rgb: '201,105,154', label: 'Pink'   },
  green:  { hex: '#7ab05a', light: '#9bcc7a', deep: '#4e7a38', rgb: '122,176,90',  label: 'Green'  },
  blue:   { hex: '#5b9bd5', light: '#7db5e8', deep: '#2e6499', rgb: '91,155,213',  label: 'Blue'   },
  red:    { hex: '#c96060', light: '#e08080', deep: '#8b3535', rgb: '201,96,96',   label: 'Red'    },
};
window.applyAccentColor = function(key) {
  var c = window.ACCENT_PALETTE[key] || window.ACCENT_PALETTE.gold;
  var s = document.documentElement.style;
  s.setProperty('--accent', c.hex);
  s.setProperty('--accent-light', c.light);
  s.setProperty('--accent-deep', c.deep);
  s.setProperty('--accent-rgb', c.rgb);
};
window.applyAccentColor(localStorage.getItem('logbook-accent-color') || 'copper');
</script>

<script>
window.DARK_MODES = {
  dark:  { bg: '#1a1820', bgRaised: '#252334', bgInset: '#2f2c3c', bgBody: '#141218', bgRgb: '26,24,32', inkFaint: 'rgba(236,228,208,0.54)', inkGhost: 'rgba(236,228,208,0.24)' },
  black: { bg: '#07060a', bgRaised: '#100d0b', bgInset: '#1a1611', bgBody: '#050409', bgRgb: '7,6,10', inkFaint: 'rgba(236,228,208,0.34)', inkGhost: 'rgba(236,228,208,0.14)' },
};
window.applyDarkMode = function(key) {
  var m = window.DARK_MODES[key] || window.DARK_MODES.dark;
  var s = document.documentElement.style;
  s.setProperty('--bg', m.bg);
  s.setProperty('--bg-raised', m.bgRaised);
  s.setProperty('--bg-inset', m.bgInset);
  s.setProperty('--bg-body', m.bgBody);
  s.setProperty('--bg-rgb', m.bgRgb);
  s.setProperty('--ink-faint', m.inkFaint);
  s.setProperty('--ink-ghost', m.inkGhost);
  var tc = document.querySelector('meta[name="theme-color"]');
  if (tc) tc.content = m.bg;
};
window.applyDarkMode(localStorage.getItem('logbook-dark-mode') || 'dark');
</script>
<!-- React 18 — production builds: ~10x smaller and faster to parse than the
     development builds, with no dev-mode runtime overhead. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<!-- Plain JS (no JSX) — run directly, no transpile needed. -->
<script src="src/supabase.js"></script>
<script src="src/store.js"></script>
<script src="src/whatsnew.js"></script>

<!-- ────────────────────────────────────────────────────────────────────────
     Precompile loader — boots the app without re-running Babel every start.

     The screens are authored in JSX. Previously every cold start downloaded
     Babel Standalone (~3 MB) and re-transpiled ~700 KB of JSX on the main
     thread — several blocking seconds on a phone. Instead we transpile each
     file once, cache the resulting JS in IndexedDB keyed by a content hash,
     and on later starts execute the cached JS directly. Babel is fetched
     lazily and only when a file is new or changed (cache miss). On any
     failure we fall back to transpiling everything through Babel, so boot can
     never end up worse than before.

     html2canvas (only needed for the share-screenshot button) is likewise
     loaded on demand instead of blocking boot.
──────────────────────────────────────────────────────────────────────── -->
<script>
(function () {
  // Executed in this exact order: ui.jsx defines shared primitives the screens
  // reference, app.jsx mounts React last. Order must be preserved.
  var SOURCES = [
    'src/ui.jsx',
    'src/screens-home.jsx',
    'src/screens-schedule.jsx',
    'src/screens-train.jsx',
    'src/screens-lib.jsx',
    'src/screens-settings.jsx',
    'src/screens-coaching-core.jsx',
    'src/screens-coaching-client.jsx',
    'src/screens-coaching-detail.jsx',
    'src/screens-coaching-tabs.jsx',
    'src/screens-health.jsx',
    'src/app.jsx',
  ];
  var BABEL_URL = 'https://unpkg.com/@babel/standalone@7.29.0/babel.min.js';
  // Reproduces the legacy <script type="text/babel"> defaults exactly (presets
  // react + env, classic-script scope). Bump the suffix if these options change
  // so previously cached output is invalidated.
  var PRESETS = ['react', 'env'];
  var PRESET_TAG = 'react+env.script.v1';
  var DB_NAME = 'zane-precompile';
  var STORE = 'modules';

  // cyrb53 — fast non-crypto content hash. Invalidates cached output whenever a
  // source file changes; no secure context or async crypto required.
  function hash(str) {
    var h1 = 0xdeadbeef, h2 = 0x41c6ce57;
    for (var i = 0; i < str.length; i++) {
      var ch = str.charCodeAt(i);
      h1 = Math.imul(h1 ^ ch, 2654435761);
      h2 = Math.imul(h2 ^ ch, 1597334677);
    }
    h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
    h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
    return (4294967296 * (2097151 & h2) + (h1 >>> 0)).toString(36);
  }

  function idbOpen() {
    return new Promise(function (resolve, reject) {
      var req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function () { req.result.createObjectStore(STORE); };
      req.onsuccess = function () { resolve(req.result); };
      req.onerror = function () { reject(req.error); };
    });
  }
  function idbGet(db, key) {
    return new Promise(function (resolve) {
      try {
        var r = db.transaction(STORE, 'readonly').objectStore(STORE).get(key);
        r.onsuccess = function () { resolve(r.result || null); };
        r.onerror = function () { resolve(null); };
      } catch (e) { resolve(null); }
    });
  }
  function idbPut(db, key, val) {
    try { db.transaction(STORE, 'readwrite').objectStore(STORE).put(val, key); } catch (e) {}
  }

  var babelPromise = null;
  function ensureBabel() {
    if (window.Babel) return Promise.resolve(window.Babel);
    if (!babelPromise) {
      babelPromise = new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.src = BABEL_URL;
        s.integrity = 'sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y';
        s.crossOrigin = 'anonymous';
        s.onload = function () { resolve(window.Babel); };
        s.onerror = function () { reject(new Error('Babel failed to load')); };
        document.head.appendChild(s);
      });
    }
    return babelPromise;
  }

  function transpile(src, filename) {
    return ensureBabel().then(function (Babel) {
      return Babel.transform(src, {
        presets: PRESETS,
        sourceType: 'script',
        filename: filename,
      }).code;
    });
  }

  // Append as a classic inline script so it runs synchronously and in order,
  // sharing the global scope exactly like the original text/babel scripts.
  function execute(code, filename) {
    var s = document.createElement('script');
    s.textContent = code + '\n//# sourceURL=' + filename;
    document.head.appendChild(s);
  }

  function showError(e) {
    var d = document.getElementById('err');
    if (d) { d.style.display = 'block'; d.textContent += '[BOOT] ' + (e && e.message || e) + '\n'; }
  }

  // Last resort: transpile + run everything through Babel (no caching).
  // Behaviourally identical to the app before this optimisation.
  function fallback() {
    var chain = Promise.resolve();
    SOURCES.forEach(function (src) {
      chain = chain.then(function () {
        return fetch(src).then(function (r) { return r.text(); })
          .then(function (code) { return transpile(code, src); })
          .then(function (out) { execute(out, src); });
      });
    });
    return chain.catch(showError);
  }

  function boot() {
    // Guard against rare environments where IndexedDB.open() hangs (some iOS
    // PWA states) — after the timeout we just proceed cache-less via Babel.
    var dbPromise = Promise.race([
      idbOpen().catch(function () { return null; }),
      new Promise(function (resolve) { setTimeout(function () { resolve(null); }, 3000); }),
    ]);
    var fetchAll = Promise.all(SOURCES.map(function (src) {
      return fetch(src).then(function (r) {
        if (!r.ok) throw new Error('fetch ' + src + ' → ' + r.status);
        return r.text();
      });
    }));

    Promise.all([dbPromise, fetchAll]).then(function (res) {
      var db = res[0], sources = res[1];
      // Resolve each file to runnable JS: from cache when the content hash
      // matches, otherwise transpile (lazy-loading Babel) and write it back.
      return Promise.all(sources.map(function (code, i) {
        var key = SOURCES[i] + '|' + PRESET_TAG;
        var h = hash(code);
        var lookup = db ? idbGet(db, key) : Promise.resolve(null);
        return lookup.then(function (rec) {
          if (rec && rec.h === h && typeof rec.code === 'string') return rec.code;
          return transpile(code, SOURCES[i]).then(function (out) {
            if (db) idbPut(db, key, { h: h, code: out });
            return out;
          });
        });
      }));
    }).then(function (compiled) {
      // Promise.all preserves order, so compiled[i] === SOURCES[i].
      compiled.forEach(function (code, i) { execute(code, SOURCES[i]); });
    }).catch(function (e) {
      showError(e);
      return fallback();
    });
  }

  // Lazily load html2canvas the first time a screenshot is actually taken.
  window.__ensureHtml2Canvas = function () {
    if (window.html2canvas) return Promise.resolve(window.html2canvas);
    if (!window.__h2cPromise) {
      window.__h2cPromise = new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.crossOrigin = 'anonymous';
        s.onload = function () { resolve(window.html2canvas); };
        s.onerror = function () { reject(new Error('html2canvas failed to load')); };
        document.head.appendChild(s);
      });
    }
    return window.__h2cPromise;
  };

  boot();
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
