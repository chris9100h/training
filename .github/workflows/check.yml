name: Syntax check

# The app has no build step: GitHub Pages serves every push as-is, and one
# syntax error in any source file blanks the whole app at runtime. This job
# transpiles all sources exactly like the in-app loader before they go live.
on:
  push:
  pull_request:
  workflow_dispatch: # allow running the checks manually from the Actions tab

jobs:
  transpile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Same Babel build and version the app itself loads from unpkg.
      - run: npm install --no-save --no-package-lock @babel/standalone@7.29.0
      - run: node tools/check-syntax.cjs
      - run: node tools/test/store.test.cjs
      # Replays all migrations and verifies schema.sql + docs/database.md
      # were updated alongside them (offline half of the DB drift checks;
      # the live half runs weekly via db-drift.yml).
      - run: node tools/check-db-docs.cjs
      # Runs export→import in a sandbox and verifies a backup round-trips every
      # schema column, so export/import can't silently drift from the DB.
      - run: node tools/check-backup-coverage.cjs
      # The public features.html sits outside the service worker; verify its
      # ?v= cache-buster tracks the sw.js CACHE version so branch/prod deploys
      # never serve it a stale feature-map catalog.
      - run: node tools/check-cache-version.cjs
