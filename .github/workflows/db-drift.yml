name: DB drift check

# Weekly live audit of the Supabase database against supabase/schema.sql and
# docs/database.md (tools/check-db-live.cjs). With the
# SUPABASE_SERVICE_ROLE_KEY repository secret set (and Migration 0142
# applied) it runs the full inventory check: columns both ways, anon
# EXECUTE grants, realtime publication. Without the secret it falls back to
# an anon-key existence probe of all schema.sql columns. Setup steps are in
# the header of tools/check-db-live.cjs.
#
# Note: scheduled workflows only run on the default branch. Exit code 2 means
# an operational error (network/auth), exit code 1 means real drift.
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node tools/check-db-live.cjs
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
